<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" type="module"></script>
  </head>

  <body>
    <!-- HEADER -->
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>
      <div class="cart">
        <a href="/cart/index.html">
          <span class="cart-count">0</span>
        </a>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="divider">
      <!-- HERO SECTION -->
      <div class="hero">
        <img src="/images/hero-sm.jpg" srcset="/images/hero-sm.jpg 500w, /images/hero.jpg"
          alt="image of a high mountain lake" />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <!-- CATEGORIES SECTION -->
      <section class="products">
        <ul class="product-grid">
          <li>
            <a href="product_listing/index.html?category=tents">
              <img src="/images/Tents.webp" alt="Tents" />
              <h2>Tents</h2>
            </a>
          </li>
      
          <li>
            <a href="product_listing/index.html?category=backpacks">
              <img src="/images/Backpacks.webp" alt="Backpacks" />
              <h2>Backpacks</h2>
            </a>
          </li>
      
          <li>
            <a href="product_listing/index.html?category=sleeping-bags">
              <img src="/images/sleeping_bags.webp" alt="Sleeping Bags" />
              <h2>Sleeping Bags</h2>
            </a>
          </li>
      
          <li>
            <a href="product_listing/index.html?category=hammocks">
              <img src="/images/Hammocks.webp" alt="Hammocks" />
              <h2>Hammocks</h2>
            </a>
          </li>
        </ul>
      </section>

      <!-- PRODUCTS SECTION -->
      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list">
          <!-- Product cards will be dynamically loaded here by JS -->
        </ul>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      &copy;2026 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway Worldwide Online
    </footer>
  </body>

</html>
