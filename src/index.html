<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/main.js" type="module"></script>
    <script>
      function setCategoryAndNavigate(category) {
        // Set URL parameter without page reload
        const url = new URL(window.location);
        url.searchParams.set('category', category);
        
        // Update the URL without reloading the page
        window.history.replaceState({}, '', url.toString());
        
        // Navigate to product listing page
        window.location.href = `?category=${category}`;
      }
    </script>
  </head>

  <body>
    <!-- HEADER -->
    <header class="divider" id="main-header">
    </header>

    <!-- MAIN CONTENT -->
    <main class="divider">
      <!-- HERO SECTION -->
      <div class="hero">
        <img src="/images/hero-sm.jpg" srcset="/images/hero-sm.jpg 500w, /images/hero.jpg"
          alt="image of a high mountain lake" />

        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>

        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <!-- PRODUCT CATEGORIES -->
      <section class="categories">
        <div class="category-card">
          <a href="?category=tents" onclick="setCategoryAndNavigate('tents')">
            <img src="/images/Tents.webp" alt="Tents" />
            <h3>Tents</h3>
          </a>
        </div>

        <div class="category-card">
          <a href="?category=backpacks" onclick="setCategoryAndNavigate('backpacks')">
            <img src="/images/Backpacks.webp" alt="Backpacks" />
            <h3>Backpacks</h3>
          </a>
        </div>

        <div class="category-card">
          <a href="?category=sleeping-bags" onclick="setCategoryAndNavigate('sleeping-bags')">
            <img src="/images/sleeping_bags.webp" alt="Sleeping Bags" />
            <h3>Sleeping Bags</h3>
          </a>
        </div>

        <div class="category-card">
          <a href="?category=hammocks" onclick="setCategoryAndNavigate('hammocks')">
            <img src="/images/Hammocks.webp" alt="Hammocks" />
            <h3>Hammocks</h3>
          </a>
        </div>
      </section>

      <!-- PRODUCTS SECTION -->
      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list">
          <!-- products will load here -->
        </ul>
      </section>
    </main>

    <!-- FOOTER -->
    <footer id="main-footer">
    </footer>
  </body>

</html>
