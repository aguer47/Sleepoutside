<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="product-detail">
        <!-- Product Category -->
        <h2></h2>

        <!-- Brand -->
        <h3 id="p-brand"></h3>

        <!-- Product Name -->
        <p id="p-name"></p>

        <!-- Product Image -->
        <figure>
          <img id="p-image" src="" alt="" width="300" />
        </figure>

        <!-- Thumbnails -->
        <div id="p-thumbs"></div>

        <!-- Product Details -->
        <p id="p-color"></p>
        <p id="p-description"></p>
        <p id="p-price"></p>

        <!-- Add to Cart Button -->
        <button id="add-to-cart" data-id="">Add to Cart</button>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>

</html>
